name: Update Icons JSON

on:
  push:
    branches: [main]
    paths:
      - 'icons/**'
      - 'tubiao/**'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # ==============================================
      # 【任务 1】生成 icons.json → 顺序：NAS PT Docker Emby 然后拼音排序
      # ==============================================
      - name: Generate icons.json
        run: |
          mkdir -p icons
          tmp_file=$(mktemp)

          # 固定顺序目录
          fixed_dirs=("NAS" "PT" "Docker" "Emby")

          # 先加固定目录
          for dir in "${fixed_dirs[@]}"; do
              if [ -d "icons/$dir" ]; then
                  find "icons/$dir" -maxdepth 1 -type f | sort >> "$tmp_file"
              fi
          done

          # 再加其他目录（拼音排序）
          other_dirs=$(find icons -mindepth 1 -maxdepth 1 -type d -exec basename {} \; | sort | grep -v -E "^(NAS|PT|Docker|Emby)$")
          for dir in $other_dirs; do
              if [ -d "icons/$dir" ]; then
                  find "icons/$dir" -maxdepth 1 -type f | sort >> "$tmp_file"
              fi
          done

          # 生成 JSON
          echo "{" > icons.json
          echo "  \"name\": \"MyIcons\"," >> icons.json
          echo "  \"count\": $(wc -l < "$tmp_file" | tr -d ' ')," >> icons.json
          echo "  \"icons\": [" >> icons.json

          first=1
          while read -r file; do
              [ -z "$file" ] && continue
              full_filename=$(basename "$file")
              filename="${full_filename%.*}"
              filepath="${file#./}"
              url="https://cdn.jsdelivr.net/gh/${GITHUB_REPOSITORY}/${filepath}"

              [ $first -eq 1 ] && first=0 || echo "," >> icons.json
              echo "    {\"name\":\"${filename}\",\"path\":\"${filepath}\",\"url\":\"${url}\"}" >> icons.json
          done < "$tmp_file"

          echo "  ]" >> icons.json
          echo "}" >> icons.json
          rm -f "$tmp_file"

      # ==============================================
      # 【任务 2】生成 tubiao.json → 全部文件遍历
      # ==============================================
      - name: Generate tubiao.json
        run: |
          mkdir -p tubiao
          tmp_file=$(mktemp)

          # 读取所有 tubiao 下的文件
          if [ -d "tubiao" ]; then
              find "tubiao" -maxdepth 1 -type f | sort >> "$tmp_file"
          fi

          echo "{" > tubiao.json
          echo "  \"name\": \"tubiao\"," >> tubiao.json
          echo "  \"count\": $(wc -l < "$tmp_file" | tr -d ' ')," >> tubiao.json
          echo "  \"icons\": [" >> tubiao.json

          first=1
          while read -r file; do
              [ -z "$file" ] && continue
              full_filename=$(basename "$file")
              filename="${full_filename%.*}"
              filepath="${file#./}"
              url="https://cdn.jsdelivr.net/gh/${GITHUB_REPOSITORY}/${filepath}"

              [ $first -eq 1 ] && first=0 || echo "," >> tubiao.json
              echo "    {\"name\":\"${filename}\",\"path\":\"${filepath}\",\"url\":\"${url}\"}" >> tubiao.json
          done < "$tmp_file"

          echo "  ]" >> tubiao.json
          echo "}" >> tubiao.json
          rm -f "$tmp_file"

      # ==============================================
      # 提交 + 强制更新（一定刷新时间）
      # ==============================================
      - name: Commit and push
        uses: EndBug/add-and-commit@v9
        with:
          message: "Auto update icons.json + tubiao.json"
          add: "icons.json tubiao.json"
