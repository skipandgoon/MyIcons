name: Update Icons JSON

on:
  push:
    branches: [main]
    paths:
      - 'icons/**'
      - 'tubiao/**'
  workflow_dispatch:  # 手动触发开关（保留且生效）

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # 确保能提交代码

      # ===========================
      # 生成 icons.json（自然排序）
      # ===========================
      - name: Generate icons.json
        run: |
          mkdir -p icons
          tmp_file=$(mktemp)

          # 固定目录 + 其他目录拼音/数字自然排序
          fixed_dirs=("NAS" "PT" "Docker" "Emby")
          for dir in "${fixed_dirs[@]}"; do
              if [ -d "icons/$dir" ]; then
                  find "icons/$dir" -maxdepth 1 -type f | sort -V >> "$tmp_file"
              fi
          done

          other_dirs=$(find icons -mindepth 1 -maxdepth 1 -type d -exec basename {} \; | sort -V | grep -v -E "^(NAS|PT|Docker|Emby)$")
          for dir in $other_dirs; do
              if [ -d "icons/$dir" ]; then
                  find "icons/$dir" -maxdepth 1 -type f | sort -V >> "$tmp_file"
              fi
          done

          # 重新生成icons.json（强制覆盖）
          echo "{" > icons.json
          echo "  \"name\": \"MyIcons\"," >> icons.json
          echo "  \"count\": $(wc -l < "$tmp_file" | tr -d ' ')," >> icons.json
          echo "  \"icons\": [" >> icons.json

          first=1
          while read -r file; do
              [ -z "$file" ] && continue
              full_filename=$(basename "$file")
              filename="${full_filename%.*}"
              filepath="${file#./}"
              url="https://cdn.jsdelivr.net/gh/${GITHUB_REPOSITORY}/${filepath}"

              [ $first -eq 1 ] && first=0 || echo "," >> icons.json
              echo "    {\"name\":\"${filename}\",\"path\":\"${filepath}\",\"url\":\"${url}\"}" >> icons.json
          done < "$tmp_file"

          echo "  ]" >> icons.json
          echo "}" >> icons.json
          rm -f "$tmp_file"

      # ===========================
      # 生成 tubiao.json（数字自然排序）
      # ===========================
      - name: Generate tubiao.json
        run: |
          tmp_file=$(mktemp)
          
          # 强制遍历tubiao所有文件（不管是否有变化）
          if [ -d "tubiao" ]; then
            folders=$(find tubiao -mindepth 1 -maxdepth 1 -type d | sort -V)
            for folder in $folders; do
              find "$folder" -type f | sort -V >> "$tmp_file"
            done
            find tubiao -maxdepth 1 -type f | sort -V >> "$tmp_file"
          fi

          # 重新生成tubiao.json（强制覆盖）
          echo "{" > tubiao.json
          echo "  \"name\": \"tubiao\"," >> tubiao.json
          echo "  \"count\": $(wc -l < "$tmp_file" | tr -d ' ')," >> tubiao.json
          echo "  \"icons\": [" >> tubiao.json

          first=1
          while read -r file; do
              [ -z "$file" ] && continue
              full_filename=$(basename "$file")
              filename="${full_filename%.*}"
              filepath="${file#./}"
              url="https://cdn.jsdelivr.net/gh/${GITHUB_REPOSITORY}/${filepath}"

              [ $first -eq 1 ] && first=0 || echo "," >> tubiao.json
              echo "    {\"name\":\"${filename}\",\"path\":\"${filepath}\",\"url\":\"${url}\"}" >> tubiao.json
          done < "$tmp_file"

          echo "  ]" >> tubiao.json
          echo "}" >> tubiao.json
          rm -f "$tmp_file"

      # ===========================
      # 强制提交（手动运行必更新）
      # ===========================
      - name: Force commit and push
        run: |
          git config --global user.name "GitHub Actions Bot"
          git config --global user.email "actions@github.com"
          # 强制添加两个文件（不管是否有变化）
          git add icons.json tubiao.json
          # 允许空提交（确保手动运行也能生成新记录）
          git commit -m "Force update icons.json and tubiao.json - $(date +'%Y-%m-%d %H:%M:%S')" --allow-empty
          # 强制推送（覆盖远端，确保更新生效）
          git push origin main --force-with-lease
