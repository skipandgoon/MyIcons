name: Update Icons JSON
on:
  push:
    branches: [main]
    paths:
      - 'icons/**'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true  # 强制 Node24，彻底消除警告
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Generate JSON
        run: |
          mkdir -p icons
          echo "{" > icons.json
          echo "  \"name\": \"MyIcons\"," >> icons.json
          echo "  \"count\": $(find icons -type f | wc -l)," >> icons.json
          echo "  \"icons\": [" >> icons.json

          first=1
          fixed_dirs=("NAS" "PT" "Emby" "TV" "Radio")

          # 1. 先输出固定顺序文件夹
          for dir in "${fixed_dirs[@]}"; do
            find icons/$dir -type f 2>/dev/null | sort | while read file; do
              name=$(basename "$file")
              path=$file
              url="https://cdn.jsdelivr.net/gh/${GITHUB_REPOSITORY}/$path"
              if [ $first -eq 1 ]; then first=0; else echo "," >> icons.json; fi
              echo "    {\"name\":\"$name\",\"path\":\"$path\",\"url\":\"$url\"}" >> icons.json
            done
          done

          # 2. 剩下文件夹按字母顺序输出
          ls -d icons/*/ 2>/dev/null | grep -vE -w "NAS|PT|Emby|TV|Radio" | sort | while read dir; do
            find $dir -type f | sort | while read file; do
              name=$(basename "$file")
              path=$file
              url="https://cdn.jsdelivr.net/gh/${GITHUB_REPOSITORY}/$path"
              if [ $first -eq 1 ]; then first=0; else echo "," >> icons.json; fi
              echo "    {\"name\":\"$name\",\"path\":\"$path\",\"url\":\"$url\"}" >> icons.json
            done
          done

          echo "]}" >> icons.json

      - name: Commit
        uses: EndBug/add-and-commit@v9
        with:
          message: "Auto update icons.json"
