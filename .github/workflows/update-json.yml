name: Update Icons JSON

于:
  push:
    分支: [main]
    paths:
      - 'icons/**'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Generate JSON
        run: |
          mkdir -p icons
          
          # 使用临时文件收集所有文件
          tmp_file=$(mktemp)
          
          # 按顺序处理目录
          for dir in NAS PT Docker Emby $(find icons -mindepth 1 -maxdepth 1 -type d -exec basename {} \; | sort | grep -v -E "^(NAS|PT|Emby)$"); do
            if [ -d "icons/$dir" ]; then
              find "icons/$dir" -maxdepth 1 -type f | sort | while read -r file; do
                echo "$file" >> "$tmp_file"
              done
            fi
          done
          
          # 生成 JSON
          echo "{" > icons.json
          echo "  \"name\": \"MyIcons\"," >> icons.json
          echo "  \"count\": $(wc -l < "$tmp_file" | tr -d ' ')," >> icons.json
          echo "  \"icons\": [" >> icons.json
          
          first=1
          while read -r file; do
            if [ -z "$file" ]; then
              continue
            fi
            full_filename=$(basename "$file")
            filename="${full_filename%.*}" 
            filepath="${file#./}"
            url="https://cdn.jsdelivr.net/gh/${GITHUB_REPOSITORY}/${filepath}"
            
            if [ $first -eq 1 ]; then
              first=0
            else
              echo "," >> icons.json
            fi
            
            echo "    {\"name\":\"${filename}\",\"path\":\"${filepath}\",\"url\":\"${url}\"}" >> icons.json
          done < "$tmp_file"
          
          echo "  ]" >> icons.json
          echo "}" >> icons.json
          rm -f "$tmp_file"

      - name: Commit
        uses: EndBug/add-and-commit@v9
        with:
          message: "Auto update icons.json"
