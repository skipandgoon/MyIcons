name: Update Icons JSON
on:
  push:
    branches: [main]
    paths:
      - 'icons/**'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Generate JSON
        run: |
          mkdir -p icons
          exec 3> icons.json

          # 正确输出 JSON 头部
          echo "{" >&3
          echo "  \"name\": \"MyIcons\"," >&3
          echo "  \"count\": $(find icons -type f | wc -l)," >&3
          echo "  \"icons\": [" >&3

          first=1
          fixed_dirs=("NAS" "PT" "Emby" "TV" "Radio")

          # 固定顺序
          for dir in "${fixed_dirs[@]}"; do
            find "icons/$dir" -type f 2>/dev/null | sort | while read -r file; do
              name=$(basename "$file")
              path="$file"
              url="https://cdn.jsdelivr.net/gh/${GITHUB_REPOSITORY}/$path"

              if [ "$first" = 1 ]; then
                first=0
              else
                echo "," >&3
              fi

              echo "    {\"name\":\"$name\",\"path\":\"$path\",\"url\":\"$url\"}" >&3
            done
          done

          # 其他文件夹按字母排序
          ls -d icons/*/ 2>/dev/null | grep -vE -w "NAS|PT|Emby|TV|Radio" | sort | while read dir; do
            find "$dir" -type f | sort | while read -r file; do
              name=$(basename "$file")
              path="$file"
              url="https://cdn.jsdelivr.net/gh/${GITHUB_REPOSITORY}/$path"

              if [ "$first" = 1 ]; then
                first=0
              else
                echo "," >&3
              fi

              echo "    {\"name\":\"$name\",\"path\":\"$path\",\"url\":\"$url\"}" >&3
            done
          done

          # 正确关闭 JSON
          echo "  ]" >&3
          echo "}" >&3
          exec 3>&-

      - name: Commit
        uses: EndBug/add-and-commit@v9
        with:
          message: "Auto update icons.json"
