name: Update Icons JSON
on:
  push:
    branches: [main]
    paths:
      - 'icons/**'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Generate JSON
        run: |
          mkdir -p icons
          echo "{" > icons.json
          echo "  \"name\": \"MyIcons\"," >> icons.json
          echo "  \"count\": $(find icons -type f | wc -l)," >> icons.json
          echo "  \"icons\": [" >> icons.json

          first=1
          find icons -type f | sort | while read -r file; do
            filename=$(basename "$file")
            filepath="${file#./}"
            url="https://cdn.jsdelivr.net/gh/${GITHUB_REPOSITORY}/${filepath}"

            if [ $first -eq 1 ]; then
              first=0
            else
              echo "," >> icons.json
            fi

            echo "    {\"name\":\"${filename}\",\"path\":\"${filepath}\",\"url\":\"${url}\"}" >> icons.json
          done

          echo "]}" >> icons.json

      - name: Commit
        uses: EndBug/add-and-commit@v9
        with:
          message: "Auto update icons.json"
